name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate config.js from repository secrets
        run: |
          cat > assets/js/config.js <<EOF
          window.APP_CONFIG = {
            FORM1_GAS_URL:     "${{ secrets.FORM1_GAS_URL }}",
            FORM2_GAS_URL:     "${{ secrets.FORM2_GAS_URL }}",
            DASHBOARD_GAS_URL: "${{ secrets.DASHBOARD_GAS_URL }}",
            SHARED_TOKEN:      "${{ secrets.SHARED_TOKEN }}",
            DASHBOARD_TOKEN:   "${{ secrets.DASHBOARD_TOKEN }}"
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
